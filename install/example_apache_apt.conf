<VirtualHost *:80>
    ServerName your_domain.com
    ServerAdmin webmaster@localhost

    WSGIDaemonProcess histarchexplorer user=www-data group=www-data threads=5
    WSGIScriptAlias / /var/www/histarchexplorer/histarchexplorer.wsgi

    <Directory /var/www/histarchexplorer>
        WSGIProcessGroup histarchexplorer
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>

    Alias /static /var/www/histarchexplorer/histarchexplorer/static
    <Directory /var/www/histarchexplorer/histarchexplorer/static>
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
