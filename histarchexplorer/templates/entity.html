{% extends "layout.html" %}

{% block content %}

    <script>
        const tabsToLoad = {{ sidebarelements | sort(attribute='order') | map(attribute='route') | list | tojson }};
        const entityId = {{ entity_id }}
    </script>

    <div class="entity-container">
        <div class="row g-0 d-flex">
            <!-- Navigation-Sidebar -->
            <div id="nav-sidebar" class="col col-auto d-none d-md-flex flex-column bg-body-tertiary align-items-center">
                <ul class="nav nav-pills flex-column text-center w-100">
                    {% for item in sidebarelements %}
                        <li class="nav-item d-none to-remove-{{ item.route }}" role="presentation">
                            <a href="#"
                               class="nav-link d-flex align-items-center {{ 'active' if active_tab == item.route else '' }}"
                               id="tab-{{ item.route }}" data-bs-toggle="tab"
                               data-bs-target="#tab-pane-{{ item.route }}" role="tab"
                               aria-controls="tab-pane-{{ item.route }}"
                               aria-selected="{{ 'true' if loop.first else 'false' }}">
                                <i class="bi {{ item.icon }} fs-5"></i>
                                <span class="ms-2">{{ item.route }}</span>
                            </a>
                        </li>
                    {% endfor %}
                    <li class="nav-item to-remove-spinner" role="presentation">
                        <a href="#" title="loading"
                           class="nav-link d-flex align-items-center"
                           id="tab-spinner">
                            <i class="spinner-border"></i>
                        </a>
                    </li>
                </ul>
            </div>


            <!-- Main content area - MUURI Tiles -->
            <div class="col flex-column grid">
                <div class="entity-content">
                    {% for item in sidebarelements %}
                        <div class="tab-pane fade d-none to-remove-{{ item.route }} {{ 'show active' if active_tab == item.route else '' }}"
                             id="tab-pane-{{ item.route }}" role="tabpanel" aria-labelledby="tab-{{ loop.index }}">
                            <div id="pane-content-{{ item.route }}">
                                <div class="spinner-grow" style="width: 3rem; height: 3rem;" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <span>{{ item.route }}</span>
                            </div>
                        </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/entity.js') }}"></script>
{% endblock %}
