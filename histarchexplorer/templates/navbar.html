<nav class="navbar main-navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid" id="navbar-container">
        <a class="navbar-brand" title="{{_('home')}}" href="{{url_for('index')}}"></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target=".navbar-collapse"
                aria-controls=".navbar-collapse" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                {% for nav_item in NAVBAR_ELEMENTS %}
                <li class="nav-item">
                    <a class="nav-link {% if nav_item['original'] == current_page %}active{% endif %}"
                       aria-current="page" title="{{ nav_item['title']}}" href="{{ url_for(nav_item['original'])}}">{{
                        nav_item[session['language']] | upper }}</a>
                </li>
                {% endfor %}
            </ul>
        </div>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-globe me-2"></i><span id="language">{{CURRENT_LANGUAGE}}</span>
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                        {% for lang in AVAILABLE_LANGUAGES.items() %}
                        <li><a class="dropdown-item"
                               href="{{ url_for('set_language', language=lang[0] )}}">{{lang[0]}}</a>
                        </li>
                        {% endfor %}
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
