{% extends "layout.html" %}
{% block content %}
  <style>
      .tabs {
          width: 100%;
      }

      .tab-links {
          list-style: none;
          padding: 0;
          margin: 0 0 10px;
          display: flex;
          border-bottom: 1px solid #ccc;
      }

      .tab-links li {
          margin-right: 10px;
      }

      .tab-links a {
          display: block;
          padding: 8px 12px;
          text-decoration: none;
          border: 1px solid #ccc;
          border-bottom: none;
          background: #eee;
      }

      .tab-links .active a {
          background: #fff;
          border-bottom: 1px solid #fff;
      }

      .tab-content .tab {
          display: none;
      }

      .tab-content .tab.active {
          display: block;
      }
  </style>
  <div class="page-wrapper">
    <div class="scrollable-container">
      <div class="container">

        <div class="tabs">
          <ul class="tab-links">
            <li class="active"><a href="#standard">Standard</a></li>
            <li><a href="#place">Place</a></li>
            <li><a href="#custom">Custom</a></li>
            <li><a href="#value">Value</a></li>
            <li><a href="#system">System</a></li>
          </ul>

          <div class="tab-content">
            <div id="standard" class="tab active">
              <div id="standardTree"></div>
            </div>
            <div id="place" class="tab">
              <div id="placeTree"></div>
            </div>
            <div id="custom" class="tab">
              <div id="customTree"></div>
            </div>
            <div id="value" class="tab">
              <div id="valueTree"></div>
            </div>
            <div id="system" class="tab">
              <div id="systemTree"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/quercus.css') }}">


  <script src="{{ url_for('static', filename='js/quercus.js') }}"></script>
  <script>
      const typeTree = {{ type_tree | tojson }};

      const treeviewContainer1 = document.getElementById('standardTree');
      const tree1 = new Treeview({
          containerId: 'standardTree',   // ID of the HTML element to render the tree into
          data: typeTree.standard,             // Your hierarchical data
          searchEnabled: true,          // Enable the search bar (default: true)
          initiallyExpanded: false,     // Start with nodes collapsed (default: false)
          multiSelectEnabled: true,     // Enable multi-selection by clicking nodes
          nodeSelectionEnabled: false,
          onSelectionChange: (selectedNodesData) => { // Callback when selection changes
              console.log('Selected Nodes (Tree 1):', selectedNodesData);
              // Example: Update a display area with selected nodes
              // document.getElementById('output-area').textContent = JSON.stringify(selectedNodesData, null, 2);
          }
      });

      const treeviewContainer2 = document.getElementById('placeTree');
      const tree2 = new Treeview({

          multiSelectEnabled: true,     // Enable multi-selection by clicking nodes
          nodeSelectionEnabled: false,
          onSelectionChange: (selectedNodesData) => { // Callback when selection changes
              console.log('Selected Nodes (Tree 1):', selectedNodesData);
              // Example: Update a display area with selected nodes
              // document.getElementById('output-area').textContent = JSON.stringify(selectedNodesData, null, 2);
          }
      });

      const treeviewContainer3 = document.getElementById('customTree');
      const tree3 = new Treeview({
          containerId: 'customTree',   // ID of the HTML element to render the tree into
          data: typeTree.custom,             // Your hierarchical data
          searchEnabled: true,          // Enable the search bar (default: true)
          initiallyExpanded: false,     // Start with nodes collapsed (default: false)
          multiSelectEnabled: true,     // Enable multi-selection by clicking nodes
          nodeSelectionEnabled: false,
          onSelectionChange: (selectedNodesData) => { // Callback when selection changes
              console.log('Selected Nodes (Tree 1):', selectedNodesData);
              // Example: Update a display area with selected nodes
              // document.getElementById('output-area').textContent = JSON.stringify(selectedNodesData, null, 2);
          }
      });

      const treeviewContainer4 = document.getElementById('valueTree');
      const tree4 = new Treeview({

          nodeSelectionEnabled: false,

              // Example: Update a display area with selected nodes
              // document.getElementById('output-area').textContent = JSON.stringify(selectedNodesData, null, 2);
          }
      });

      const treeviewContainer5 = document.getElementById('systemTree');
      const tree5 = new Treeview({
          containerId: 'systemTree',   // ID of the HTML element to render the tree into
          data: typeTree.system,             // Your hierarchical data
          searchEnabled: true,          // Enable the search bar (default: true)
          initiallyExpanded: false,     // Start with nodes collapsed (default: false)
          multiSelectEnabled: true,
          nodeSelectionEnabled: false,
          onSelectionChange: (selectedNodesData) => { // Callback when selection changes
              console.log('Selected Nodes (Tree 1):', selectedNodesData);
              // Example: Update a display area with selected nodes
              // document.getElementById('output-area').textContent = JSON.stringify(selectedNodesData, null, 2);
          }

      });


      document.querySelectorAll('.tab-links a').forEach(link => {
          link.addEventListener('click', function (e) {
              e.preventDefault();
              const target = this.getAttribute('href').substring(1);

              document.querySelectorAll('.tab-links li').forEach(li => li.classList.remove('active'));
              this.parentElement.classList.add('active');

              document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
              document.getElementById(target).classList.add('active');
          });
      });


  </script>
{% endblock %}
