<div class="card mt-3 mb-5">
  <div class="card-body">
    <h5 class="card-title">{{ _('Footer Content') | upper }}</h5>
    <form action="{{ url_for('update_footer_content') }}" method="post">
      {% if all_logos %}
        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-4">
          {% for logo in all_logos %}
            <div class="col">
              <div class="card h-100">
                <img src="{{ url_for('static', filename='images/logos/' + logo.filename) }}" class="card-img-top p-3" alt="{{ logo.filename }}" style="object-fit: contain; height: 150px;">
                <div class="card-body">
                  <p class="card-text small text-muted" style="word-break: break-all;">{{ logo.filename }}</p>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="footer_logos" value="{{ logo.id }}" id="checkbox-{{ logo.id }}"
                           {% if logo.id in selected_footer_logos %}checked{% endif %}>
                    <label class="form-check-label" for="checkbox-{{ logo.id }}">
                      {{ _('Add to Footer') }}
                    </label>
                  </div>
                </div>
              </div>
            </div>
          {% endfor %}
        </div>
        <button type="submit" class="btn btn-primary mt-3">{{ _('Save Footer Content') }}</button>
      {% else %}
        <p class="text-muted">{{ _('No logos have been uploaded yet.') }}</p>
      {% endif %}
    </form>
  </div>
</div>
