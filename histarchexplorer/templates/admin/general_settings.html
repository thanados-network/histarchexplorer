<div class="d-flex justify-content-start align-items-start row">
  <form id="caseStudyForm" method="POST" class="needs-validation"
        novalidate
        data-action-template="/admin/update_general_settings/">
    <div class=" col mb-3">
      <label for="caseStudyHierarchyID"
             class="form-label">{{ _('case study hierarchy ID') }}</label>
      <input type="text" class="form-control"
             id="caseStudyHierarchyID" name="case_study_id"
             pattern="^\d+$"
             value="{{ initial_case_study_type_id or '' }}"
             required>
      <div class="invalid-feedback" id="caseStudyIDFeedback">
        {{ _('Please enter a positive integer for the Case Study Hierarchy ID.') }}
      </div>
      <span id="caseStudyTypeName"
            class="form-text text-muted mt-2">
                {% if initial_case_study_type_name %}
                  ({{ initial_case_study_type_name }})
                {% endif %}
              </span>
    </div>
    <div class="col mb-3">
      <div class="form-check form-switch mt-3 mb-3">
        <input
          class="form-check-input"
          type="checkbox"
          id="deactivateDarkModeSwitch"
          name="darkMode" {% if settings.darkmode %} checked {% endif %}>
        <label class="form-check-label"
               for="deactivateDarkModeSwitch">Deactivate Darkmode</label>
      </div>
    </div>
    <div class="col mb-3">
      <div class="form-check form-switch mt-3 mb-3">
        <input
          class="form-check-input"
          type="checkbox"
          id="deactivateLanguageSelector"
          name="languageSelection" {% if settings.language_selector %} checked {% endif %}>
        <label class="form-check-label"
               for="deactivateLanguageSelector">Deactivate Language Selector</label>
      </div>
    </div>

    <button
      type="submit"
      class="btn btn-primary">{{ _('Save') }}
    </button>
  </form>
</div>
