{% extends "layout.html" %}
{% block content %}
  <script>
    const file_id = {{ file_id|tojson }};
  </script>
  <div class="page-wrapper">
    <div class="scrollable-container">
      <div class="container-fluid py-4 text-center">
        <div class="d-flex justify-content-center">
          <div class="video-viewer-wrapper position-relative"
               style="width: 90%; height: 80vh; max-width: 1200px;">

            <!-- Video player -->
            <video id="mainVideo"
                   class="w-100 h-100 rounded shadow"
                   src="{{ file_url }}"
                   controls
                   autoplay
                   muted
                   preload="metadata"
                   style="object-fit: contain; background-color: #000;">
              Your browser does not support the video tag.
            </video>

            <!-- ===== TOOLBOX ===== -->
            <div id="toolbox"
                 class="position-absolute top-0 end-0 m-3 d-flex flex-column gap-2">
              <button class="btn btn-light btn-sm" id="btn-play"
                      title="Play / Pause">
                <i class="bi bi-play-fill"></i>
              </button>
              <button class="btn btn-light btn-sm" id="btn-mute"
                      title="Toggle Mute">
                <i class="bi bi-volume-mute-fill"></i>
              </button>
              <button class="btn btn-light btn-sm" id="btn-speed"
                      title="Change Speed">
                <i class="bi bi-speedometer"></i>
              </button>
              <button class="btn btn-light btn-sm" id="btn-fullscreen"
                      title="Fullscreen">
                <i class="bi bi-arrows-fullscreen"></i>
              </button>
              <button class="btn btn-light btn-sm" id="btn-download"
                      title="Download Video">
                <i class="bi bi-download"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script
    src="{{ url_for('static', filename='js/viewer/video.js') }}"></script>
{% endblock %}
