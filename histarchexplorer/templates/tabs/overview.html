{% extends "layout.html" %}
{% block content %}

  <div class="container-fluid py-4">
    <div class="grid-muuri" id="overview-root"></div>
  </div>

  <script src="{{ url_for('static', filename='js/overview.js') }}"></script>
  <script
    src="{{ url_for('static', filename='js/map_overview.js') }}"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof Muuri === "undefined") {
        console.warn("⚠️ Muuri not loaded!");
        return;
      }

      window.overviewGrid = new Muuri(".grid-muuri", {
        layout: {fillGaps: true},
        dragEnabled: false,
        layoutDuration: 0
      });

      window.relayout = (delay = 0) => {
        if (!window.overviewGrid) return;
        setTimeout(() => window.overviewGrid.refreshItems().layout(), delay);
      };
    });
  </script>
{% endblock %}
