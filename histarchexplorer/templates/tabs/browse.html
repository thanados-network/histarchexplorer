<div id="{{ tab_name }}-header" class="d-flex align-items-center justify-content-between flex-wrap gap-3 m-3">

    <h3 class="m-0">{{ tab_name[0]|upper }}{{ tab_name[1:] }}</h3>

    <div class="input-group" style="max-width: 400px;">
        <input type="text" id="filterInput{{ tab_name }}" class="form-control" placeholder="Search / Filter">
        <button class="btn btn-outline-secondary" type="button" id="clearFilter{{ tab_name }}">&times;</button>
    </div>

    <div style="min-width: 400px" id="sliderBegin{{ tab_name }}"></div>
    <div style="min-width: 400px" id="sliderEnd{{ tab_name }}"></div>

    <div class="dropdown d-none" id="classDropdown{{ tab_name }}">
        <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                aria-expanded="false">
            Classes
        </button>
        <ul class="dropdown-menu p-2" style="min-width: 250px;" id="classSelect{{ tab_name }}">
        </ul>
    </div>

    <button type="button" class="btn btn-outline-secondary d-flex align-items-center gap-2"
            onclick="{{ tab_name }}TreeModal.show()" title="Types">Types
    </button>

    <button type="button" class="btn btn-outline-secondary d-flex align-items-center gap-2"
            onclick="{{ tab_name }}Modal.show()" title="Advanced Sort">
        <i class="bi bi-funnel"></i>
    </button>

</div>

<div id="table-{{ tab_name }}" class="tabulator-container"></div>

<div class="modal fade" id="modal-{{ tab_name }}" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
     aria-labelledby="modal-title-{{ tab_name }}" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-fullscreen-sm-down">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal-title-{{ tab_name }}">Sort
                    {{ tab_name[0]|upper }}{{ tab_name[1:] }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row align-items-end mb-2">
                    <div class="col">
                        <label class="form-label">Sort by</label>
                    </div>
                    <div class="col">
                        <label class="form-label">Direction</label>
                    </div>
                    <div class="col-auto">
                        <button type="button" class="btn btn-outline-danger remove-sort-level opacity-0 disabled">
                            Remove
                        </button>
                    </div>
                </div>
                <div id="sort-levels-{{ tab_name }}">

                </div>
            </div>
            <div class="d-flex justify-content-between m-3">
                <button type="button" class="btn btn-outline-primary"
                        id="add-sort-level-{{ tab_name }}">
                    Add Sort Level
                </button>
                <span>
                                    <button type="button" class="btn btn-warning" id="reset-sort-btn-{{ tab_name }}">
                                        Reset
                                    </button>
                                    <button type="button" class="btn btn-primary" id="apply-sort-btn-{{ tab_name }}">
                                        Apply
                                    </button>
                                    </span>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="modal-{{ tab_name }}-tree" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
     aria-labelledby="modal-title-{{ tab_name }}-tree" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-fullscreen-sm-down">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal-title-{{ tab_name }}-tree">Select Type(s)</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="{{ tab_name }}-tree-container"></div>
            </div>
            <div class="modal-footer justify-content-between">

                <span class="form-check">
                    <input class="form-check-input" type="checkbox" id="include-subcategories-{{ tab_name }}">
                    <label class="form-check-label" for="include-subcategories-{{ tab_name }}">
                      Include subcategories
                    </label>
                </span>
                <span>
                <button type="button" class="btn btn-warning" id="reset-type-btn-{{ tab_name }}">
                    Reset
                </button>
                <button type="button" class="btn btn-primary" id="apply-type-btn-{{ tab_name }}"
                        onclick="filtertypes{{ tab_name }}()" ;>
                    Apply
                </button>
                </span>

            </div>
        </div>
    </div>
</div>

<script>

    //prepare data
    const {{ tab_name }}Data = {}

    {{ tab_name }}Data.tableData = getEntitiesForTab('{{ tab_name }}');
    {{ tab_name }}Data.typeIds = [...new Set({{ tab_name }}Data.tableData.map(item => item.type_id))];
    {{ tab_name }}Data.treeData = collectAndGroupMatchingData(typeTreeData, viewClasses.{{ tab_name }}, ["standard"], {{ tab_name }}Data.typeIds)

    {{ tab_name }}Data.fields = getKeysWithValues({{ tab_name }}Data.tableData)
    {{ tab_name }}Data.classes = [...new Set({{ tab_name }}Data.tableData.map(item => item.class))];

    {{ tab_name }}Data.timelineBegin = getSortedDistinctTimeline({{ tab_name }}Data.tableData, "beginString", "beginDBP");
    {{ tab_name }}Data.timelineEnd = getSortedDistinctTimeline({{ tab_name }}Data.tableData, "endString", "endDBP");


    //columns for table
    let beginDBP{{tab_name}} = null
    let endDBP{{tab_name}} = null
    let type_id{{tab_name}} = null
    let type_value{{tab_name}} = false


    const columns{{ tab_name }} = [
        {
            title: "Name",
            field: "name",
            headerSort: true,
            minWidth: 450,
            formatter: function (cell) {
                const data = cell.getRow().getData();
                const id = data.id;
                const name = data.name;
                const begin = data.begin;
                const end = data.end;
                const description = translateDescription(data.description);
                let localBeginDate = ''
                let localEndDate = ''
                let dateString = '';
                if (begin) {
                    localBeginDate = data.beginString
                    dateString += localBeginDate;
                    beginDBP{{tab_name}} = data.beginDBP;
                }

                if (end) {
                    localEndDate = data.endString;
                }

                if (begin && end && localBeginDate !== localEndDate) {
                    dateString += " - ";
                }
                if (end && localEndDate !== localBeginDate) {
                    dateString += data.endString;
                    endDBP{{tab_name}} = data.endDBP;
                }

                let hoverTitle = `${name || ''} ${dateString ? '(' + dateString + ')' : ''}`.trim();

                if (description) {
                    hoverTitle += `\n\n${description}`;
                }

                return `<div title="${hoverTitle}">` +
                    `<span>${name}</span><br>` +
                    `<span class="name-column-date-subtitle">${dateString}</span>` +
                    `</div>`;
            }
        },
        {
            title: "Category",
            field: "class",
            headerSort: false,
            maxWidth: 450,
            minWidth: 450,
            formatter: function (cell) {
                const data = cell.getRow().getData();
                let classValue = data.class;
                let typeValue = data.type;

                let leftContent = '';
                let rawClass = '';
                if (classValue) {
                    rawClass = classValue;
                    leftContent = classValue.charAt(0).toUpperCase() + classValue.slice(1);
                }

                let rightContent = '';
                let rawType = '';
                if (typeValue) {
                    type_value{{tab_name}} = true
                    rawType = typeValue;
                    rightContent = typeValue;
                }

                let combinedHtml = '';

                if (leftContent) {
                    combinedHtml += `<span>${leftContent}</span>`;
                }
                if (rightContent) {
                    combinedHtml += `<br><i class="category-column-type-subtitle">${rightContent}</i>`;
                }

                if (leftContent || rightContent) {
                    combinedHtml += `<div class="tabulator-cell-clearfix"></div>`;
                }

                let hoverTitle = '';
                if (rawClass && rawType) {
                    hoverTitle = `${leftContent} / ${rawType}`;
                } else if (rawClass) {
                    hoverTitle = rawClass;
                } else if (rawType) {
                    hoverTitle = rawType;
                }


                return `<div title="${hoverTitle}">` +
                    combinedHtml +
                    `</div>`;
            }
        },
        {
            title: "Begin",
            field: "begin",
            visible: false
        },
        {
            title: "End",
            field: "end",
            visible: false
        },
        {
            title: "BeginDBP",
            field: "beginDBP",
            visible: false,
            sorterParams: {alignEmptyValues: "bottom"}
        },
        {
            title: "EndDBP",
            field: "endDBP",
            visible: false,
            sorterParams: {alignEmptyValues: "bottom"}
        },
        {
            title: "TypeId",
            field: "type_id",
            visible: false
        },
        {
            title: "Type",
            field: "type",
            visible: false,
            sorterParams: {alignEmptyValues: "bottom"}
        },
        {
            title: "all",
            field: "all",
            visible: false
        }
    ];


    const table{{ tab_name }} = new Tabulator("#table-{{ tab_name }}", {
        layout: "fitColumns",
        responsiveLayout: "collapse",
        height: "calc( 100vh - 100px - 4rem)",
        data: {{ tab_name }}Data.tableData,
        pagination: "local",
        paginationSize: 50,
        paginationSizeSelector: [20, 50, 100],
        columns: columns{{ tab_name }},
    });

    table{{ tab_name }}.on("rowClick", function (e, row) {
        const rowData = row.getData();
        const id = rowData.id;

        if (id) {
            const url = `/entity/${id}`;
            window.location.href = url;
        }
    });


    //advanced filter/sort modal
    const {{tab_name}}Modal = new bootstrap.Modal('#modal-{{ tab_name }}', {})
    const {{tab_name}}TreeModal = new bootstrap.Modal('#modal-{{ tab_name }}-tree', {})

    const sortLevelsContainer{{ tab_name }} = document.getElementById('sort-levels-{{ tab_name }}');
    const addSortLevelBtn{{ tab_name }} = document.getElementById('add-sort-level-{{ tab_name }}');

    let sortLevelId{{ tab_name }} = 0;

    function addSortLevel{{ tab_name }}() {
        const level{{ tab_name }} = createSortLevel(sortLevelId{{ tab_name }}++, {{ tab_name }}Data.fields);
        sortLevelsContainer{{ tab_name }}.appendChild(level{{ tab_name }});
    }

    addSortLevelBtn{{ tab_name }}.addEventListener('click', () => {
        addSortLevel{{ tab_name }}();
    });

    sortLevelsContainer{{ tab_name }}.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-sort-level')) {
            e.target.closest('.row').remove();
        }
    });

    document.getElementById('apply-sort-btn-{{ tab_name }}').addEventListener('click', () => {
        const sorters{{ tab_name }} = [];

        const levels{{ tab_name }} = sortLevelsContainer{{ tab_name }}.querySelectorAll('.row');
        levels{{ tab_name }}.forEach(level => {
            const field{{ tab_name }} = level.querySelector('.sort-field').value;
            const direction{{ tab_name }} = level.querySelector('.sort-direction').value;
            if (field{{ tab_name }}) {
                sorters{{ tab_name }}.push({column: field{{ tab_name }}, dir: direction{{tab_name}}});
            }
        });

        table{{ tab_name }}.setSort(sorters{{ tab_name }});
    });

    document.getElementById('reset-sort-btn-{{ tab_name }}').addEventListener('click', () => {
        table{{ tab_name }}.clearSort();
        sortLevelsContainer{{ tab_name }}.innerHTML = '';  // Optionally clear UI
        addSortLevel{{ tab_name }}();  // Optionally add one empty level back
    });

    document.getElementById('modal-{{ tab_name }}').addEventListener('shown.bs.modal', () => {
        if (sortLevelsContainer{{ tab_name }}.children.length === 0) {
            addSortLevel{{ tab_name }}();
        }
    });

    //simple filter input
    const filterInput{{ tab_name }} = document.getElementById("filterInput{{ tab_name }}");
    const clearButton{{ tab_name }} = document.getElementById("clearFilter{{ tab_name }}");

    clearButton{{ tab_name }}.addEventListener("click", function () {
        filterInput{{ tab_name }}.value = "";
        applyCombinedFilter{{ tab_name }}();
        filterInput{{ tab_name }}.focus();
    });

    //filter classes
    const classList{{ tab_name }} = {{ tab_name }}Data.classes;


    if (classList{{ tab_name }}.length > 1) {
        const classSelect{{ tab_name }} = document.getElementById("classSelect{{ tab_name }}");
        const classDropdown = document.getElementById("classDropdown{{ tab_name }}");
        classDropdown.classList.remove("d-none");

        classList{{ tab_name }}.forEach(cls => {
            const li = document.createElement("li");
            li.classList.add("form-check");

            li.innerHTML = `
        <input class="form-check-input" type="checkbox" value="${cls}" id="check-${cls}">
        <label class="form-check-label" for="check-${cls}">${cls.replace('_', ' ')}</label>
    `;

            classSelect{{ tab_name }}.appendChild(li);
        });
    }

    document.addEventListener("change", function (e) {
        if (e.target.matches(`#classSelect{{ tab_name }} input[type="checkbox"]`)) {
            applyCombinedFilter{{ tab_name }}();
        }
    });

    // DYNAMIC TREE FILTERING FUNCTIONS

    // Function to get filtered data based on current search
    function getFilteredTableData{{ tab_name }}() {
        const textValue = document.getElementById(`filterInput{{tab_name}}`).value.trim();
        const checkboxes = document.querySelectorAll(`#classSelect{{tab_name}} input[type="checkbox"]:checked`);
        const selectedClasses = Array.from(checkboxes).map(cb => cb.value);

        let filteredData = {{ tab_name }}Data.tableData;

        // Apply text filter
        if (textValue) {
            filteredData = filteredData.filter(item =>
                item.all && item.all.toLowerCase().includes(textValue.toLowerCase())
            );
        }

        // Apply class filter
        if (selectedClasses.length > 0) {
            filteredData = filteredData.filter(item =>
                selectedClasses.includes(item.class)
            );
        }

        // Apply date range filters if they exist
        if ({{ tab_name }}Data.fields.includes("begin") && typeof sliderBegin{{ tab_name }} !== 'undefined' && sliderBegin{{ tab_name }}.noUiSlider) {
            const beginSliderValues = sliderBegin{{ tab_name }}.noUiSlider.get();
            const [beginMin, beginMax] = getDaysBPBfromString(beginSliderValues, {{ tab_name }}Data.timelineBegin);

            if (!isNaN(beginMin) && !isNaN(beginMax)) {
                filteredData = filteredData.filter(item =>
                    item.beginDBP >= beginMin && item.beginDBP <= beginMax
                );
            }
        }

        if ({{ tab_name }}Data.fields.includes("end") && typeof sliderEnd{{ tab_name }} !== 'undefined' && sliderEnd{{ tab_name }}.noUiSlider) {
            const endSliderValues = sliderEnd{{ tab_name }}.noUiSlider.get();
            const [endMin, endMax] = getDaysBPBfromString(endSliderValues, {{ tab_name }}Data.timelineEnd);

            if (!isNaN(endMin) && !isNaN(endMax)) {
                filteredData = filteredData.filter(item =>
                    item.endDBP >= endMin && item.endDBP <= endMax
                );
            }
        }

        return filteredData;
    }

    // Function to get type IDs that should be shown in tree (including ancestors)
    function getValidTypeIdsWithAncestors{{ tab_name }}(filteredData, treeData) {
        const resultTypeIds = [...new Set(filteredData.map(item => item.type_id))];
        const validTypeIds = new Set();

        // Helper function to find all ancestors of a node
        function findAncestors(nodeId, tree) {
            for (const node of tree) {
                if (node.id === nodeId) {
                    return [nodeId];
                }
                if (node.children && node.children.length > 0) {
                    const childResult = findAncestors(nodeId, node.children);
                    if (childResult.length > 0) {
                        return [node.id, ...childResult];
                    }
                }
            }
            return [];
        }

        // For each result type ID, find its ancestors and add them all
        for (const tree in treeData) {
            for (const typeId of resultTypeIds) {
                const ancestors = findAncestors(typeId, treeData[tree]);
                ancestors.forEach(ancestorId => validTypeIds.add(ancestorId));
            }
        }

        return validTypeIds;
    }

    // Function to mark tree nodes as available/unavailable using selectable property
    function markTreeDataAvailability{{ tab_name }}(treeData, validTypeIds) {
        function markNodes(nodes) {
            return nodes.map(node => {
                const nodeCopy = {...node}; // Create a copy

                // Set selectable based on availability - library will handle the rest!
                nodeCopy.selectable = validTypeIds.has(node.id);

                // Process children recursively
                if (node.children && node.children.length > 0) {
                    nodeCopy.children = markNodes(node.children);
                }

                return nodeCopy;
            });
        }

        const markedTreeData = {};
        for (const tree in treeData) {
            markedTreeData[tree] = markNodes(treeData[tree]);
        }

        return markedTreeData;
    }

    // Enhanced CSS to make unavailable nodes more visually distinct
    function addEnhancedUnavailableStyles{{ tab_name }}() {
        if (!document.getElementById('enhanced-unavailable-styles-{{ tab_name }}')) {
            const styleElement = document.createElement('style');
            styleElement.id = 'enhanced-unavailable-styles-{{ tab_name }}';
            styleElement.textContent = `
                /* Enhance the existing .not-selectable class */
                .custom-treeview-wrapper .treeview-node-content.not-selectable {
                    opacity: 0.4 !important; /* More faded than default 0.6 */
                    color: #999 !important;
                    font-style: italic !important;
                }

                /* Also grey out the checkbox if present */
                .custom-treeview-wrapper .treeview-node-content.not-selectable .treeview-checkbox {
                    opacity: 0.3 !important;
                }

                /* Add a subtle strikethrough effect */
                .custom-treeview-wrapper .treeview-node-content.not-selectable .treeview-node-text {
                    text-decoration: line-through;
                    text-decoration-color: #ccc;
                }
            `;
            document.head.appendChild(styleElement);
        }
    }

    // Function to rebuild tree with filtered data
    function rebuildTreeWithFilteredData{{ tab_name }}() {
        const filteredData = getFilteredTableData{{ tab_name }}();
        const validTypeIds = getValidTypeIdsWithAncestors{{ tab_name }}(filteredData, {{ tab_name }}Data.treeData);

        // Mark unavailable nodes as non-selectable - library handles the styling!
        const markedTreeData = markTreeDataAvailability{{ tab_name }}({{ tab_name }}Data.treeData, validTypeIds);

        // Add our enhanced styling
        addEnhancedUnavailableStyles{{ tab_name }}();

        // Clear existing trees
        const container = document.getElementById("{{ tab_name }}-tree-container");
        if (!container) return; // Safety check

        container.innerHTML = '';

        // Store current selections before rebuilding
        const currentSelections = {};
        if (window.{{ tab_name }}TreeInstances) {
            for (const tree in window.{{ tab_name }}TreeInstances) {
                if (window.{{ tab_name }}TreeInstances[tree]) {
                    currentSelections[tree] = {
                        selectedNodeIds: window.{{ tab_name }}TreeInstances[tree].selectedNodeIds || [],
                        selectedNodeIdsWithChildren: window.{{ tab_name }}TreeInstances[tree].selectedNodeIdsWithChildren || []
                    };
                }
            }
        }

        // Completely clear and reinitialize tree instances
        window.{{ tab_name }}TreeInstances = {};

        // Rebuild trees - now ALL trees are shown, with unavailable nodes greyed out
        const allOriginalTrees = Object.keys({{ tab_name }}Data.treeData);

        for (const tree of allOriginalTrees) {
            const div = document.createElement('div');
            div.id = `{{ tab_name }}Tree${tree}`;
            div.classList.add('tree-container');
            div.innerHTML = `
                <div class="tree-header">
                    <h3 class="tree-header-title">${tree.charAt(0).toUpperCase()}${tree.slice(1)}</h3>
                </div>
            `;

            div.classList.add('typeTreeSelector');
            container.appendChild(div);

            // Create Treeview with marked data (unavailable nodes have selectable: false)
            const treeview = new Treeview({
                containerId: `{{ tab_name }}Tree${tree}`,
                data: markedTreeData[tree], // Library will automatically apply .not-selectable class
                searchEnabled: true,
                nodeNameKey: 'label',
                initiallyExpanded: false,
                checkboxSelectionEnabled: true,
                multiSelectEnabled: true,
                showExpandCollapseAllButtons: true,
                showSelectAllButton: true,
                showInvertSelectionButton: true,
                onSelectionChange: (selectedNodesData) => {
                    // Only available nodes will be selectable, so no filtering needed here
                    window.{{ tab_name }}TreeInstances[tree].selectedNodeIds = selectedNodesData.map(node => node.id);
                    window.{{ tab_name }}TreeInstances[tree].selectedNodeIdsWithChildren = treeview.getSelectedNodesAndChildrenValues('id');
                }
            });

            window.{{ tab_name }}TreeInstances[tree] = treeview;
            window.{{ tab_name }}TreeInstances[tree].selectedNodeIds = [];
            window.{{ tab_name }}TreeInstances[tree].selectedNodeIdsWithChildren = [];

            // Restore selections that are still available
            if (currentSelections[tree]?.selectedNodeIds.length > 0) {
                const validSelections = currentSelections[tree].selectedNodeIds.filter(id => validTypeIds.has(id));
                if (validSelections.length > 0) {
                    try {
                        validSelections.forEach(id => treeview.selectNodeById(id, true));
                        window.{{ tab_name }}TreeInstances[tree].selectedNodeIds = validSelections;
                    } catch (e) {
                        console.log('Could not restore selections:', e);
                    }
                }
            }
        }
    }

    // applyCombinedFilter function
    function applyCombinedFilter{{ tab_name }}() {
        const textValue = document.getElementById(`filterInput{{tab_name}}`).value.trim();
        const checkboxes = document.querySelectorAll(`#classSelect{{tab_name}} input[type="checkbox"]:checked`);
        const selectedClasses = Array.from(checkboxes).map(cb => cb.value);

        const filters = [];

        if (selectedNodes{{ tab_name }}.length > 0) {
            filters.push({
                field: "type_id",
                type: "in",
                value: selectedNodes{{ tab_name }}
            });
        }

        if (textValue) {
            filters.push({field: "all", type: "like", value: textValue});
        }

        if (selectedClasses.length > 0) {
            filters.push({
                field: "class",
                type: "in",
                value: selectedClasses
            });
        }

        if ({{ tab_name }}Data.fields.includes("begin") && typeof sliderBegin{{ tab_name }} !== 'undefined' && sliderBegin{{ tab_name }}.noUiSlider) {
            const beginSliderValues = sliderBegin{{ tab_name }}.noUiSlider.get();
            const [beginMin, beginMax] = getDaysBPBfromString(beginSliderValues, {{ tab_name }}Data.timelineBegin);

            if (!isNaN(beginMin) && !isNaN(beginMax)) {
                filters.push({field: "beginDBP", type: ">=", value: beginMin});
                filters.push({field: "beginDBP", type: "<=", value: beginMax});
            }
        }

        if ({{ tab_name }}Data.fields.includes("end") && typeof sliderEnd{{ tab_name }} !== 'undefined' && sliderEnd{{ tab_name }}.noUiSlider) {
            const endSliderValues = sliderEnd{{ tab_name }}.noUiSlider.get();
            const [endMin, endMax] = getDaysBPBfromString(endSliderValues, {{ tab_name }}Data.timelineEnd);

            if (!isNaN(endMin) && !isNaN(endMax)) {
                filters.push({field: "endDBP", type: ">=", value: endMin});
                filters.push({field: "endDBP", type: "<=", value: endMax});
            }
        }

        if (filters.length > 0) {
            table{{tab_name}}.setFilter(filters);
        } else {
            table{{tab_name}}.clearFilter();
        }
    }

    // Filter input event listener
    filterInput{{ tab_name }}.addEventListener("input", function () {
        applyCombinedFilter{{ tab_name }}();
    });

    // Event listener for when tree modal is shown
    document.getElementById('modal-{{ tab_name }}-tree').addEventListener('shown.bs.modal', () => {
        rebuildTreeWithFilteredData{{ tab_name }}();
    });

    if ({{ tab_name }}Data.fields.includes("begin")) {

        const sliderBegin{{ tab_name }} = document.getElementById('sliderBegin{{ tab_name }}');

        const arbitraryValuesForSlider{{ tab_name }} = {{ tab_name }}Data.timelineBegin.map(e => e.string);


        noUiSlider.create(sliderBegin{{ tab_name }}, {
            range: {min: 0, max: arbitraryValuesForSlider{{ tab_name }}.length - 1},
            start: [arbitraryValuesForSlider{{ tab_name }}[0], arbitraryValuesForSlider{{ tab_name }}[arbitraryValuesForSlider{{ tab_name }}.length - 1]],
            step: 1,
            tooltips: true,
            format: {
                to: function (value) {
                    return arbitraryValuesForSlider{{ tab_name }}[Math.round(value)];
                },
                from: function (value) {
                    return arbitraryValuesForSlider{{ tab_name }}.indexOf(value);
                }
            }
        });

        sliderBegin{{ tab_name }}.noUiSlider.on("change", function (values) {
            applyCombinedFilter{{ tab_name }}();
        });
    }

    if ({{ tab_name }}Data.fields.includes("end")) {

        const sliderEnd{{ tab_name }} = document.getElementById('sliderEnd{{ tab_name }}');

        const arbitraryValuesForSlider{{ tab_name }} = {{ tab_name }}Data.timelineEnd.map(e => e.string);


        noUiSlider.create(sliderEnd{{ tab_name }}, {
            range: {min: 0, max: arbitraryValuesForSlider{{ tab_name }}.length - 1},
            start: [arbitraryValuesForSlider{{ tab_name }}[0], arbitraryValuesForSlider{{ tab_name }}[arbitraryValuesForSlider{{ tab_name }}.length - 1]],
            step: 1,
            tooltips: true,
            format: {
                to: function (value) {
