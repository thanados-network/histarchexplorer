{% extends "layout.html" %}

{% block content %}
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<!-- Leaflet JavaScript -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Custom JavaScript -->
<script src="{{ url_for('static', filename='js/index.js') }}"></script>


<style>
    #index-image {
        background-image: url('/../static/images/index_map_bg/Blank_map_of_Europe_central_network.png');
        opacity: 0.5;
        background-size: cover; /* Adjusts the size of the background image */
        background-position: center; /* Centers the background image horizontally and vertically */
        width: 100%; /* Ensures the container spans the width of its parent element */
        max-height: 100%; /* Adjusts the height of the container */
        position: relative; /* Positions the container relative to its parent */
    }
</style>
<div id="index-container">
    <div id="map" class="map-gray"></div>
    <div id="index-image">

    </div>
</div>

<div id="counters" class="text-center pt-3">
    <div class="row gx-0">
        <div class="col-6 col-sm">
            <h4 class="statistic-counter">563</h4>
            <p>Places</p>
        </div>
        <div class="col-6 col-sm">
            <h4 class="statistic-counter">5363</h4>
            <p>Actors</p>
        </div>
        <div class="col-6 col-sm">
            <h4 class="statistic-counter">5643</h4>
            <p>Events</p>
        </div>
        <div class="col-6 col-sm">
            <h4 class="statistic-counter">11555</h4>
            <p>Artifacts</p>
        </div>
        <div class="col-6 col-sm">
            <h4 class="statistic-counter">6169</h4>
            <p>Sources</p>
        </div>
    </div>
</div>

{% endblock %}
